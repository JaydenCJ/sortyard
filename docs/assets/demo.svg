<svg xmlns="http://www.w3.org/2000/svg" width="1060" height="680" viewBox="0 0 1060 680" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="15">
  <!-- Terminal rendering of a real sortyard session (output copied verbatim
       from a run on 2026-07-13: 1,000,000 quoted-CSV rows, 57 MB, sorted
       with a 16 MB buffer in 3.5 s). -->
  <rect width="1060" height="680" rx="10" fill="#1c2128"/>
  <rect width="1060" height="34" rx="10" fill="#2d333b"/>
  <rect y="24" width="1060" height="10" fill="#2d333b"/>
  <circle cx="20" cy="17" r="6" fill="#f47067"/>
  <circle cx="40" cy="17" r="6" fill="#e0b543"/>
  <circle cx="60" cy="17" r="6" fill="#57ab5a"/>
  <text x="530" y="22" text-anchor="middle" fill="#909dab">sortyard — sort the export, not the bytes</text>

  <g fill="#adbac7">
    <text x="24" y="66"><tspan fill="#6cb6ff">$</tspan> sortyard -k price:num:desc -k ordered_at:date export.csv --mem 16M --stats -o sorted.csv</text>
    <text x="24" y="92" fill="#768390">sortyard: format:          csv</text>
    <text x="24" y="118" fill="#768390">sortyard: records read:    1000000</text>
    <text x="24" y="144" fill="#768390">sortyard: records written: 1000001</text>
    <text x="24" y="170" fill="#768390">sortyard: bytes read:      56618614</text>
    <text x="24" y="196" fill="#768390">sortyard: spilled runs:    9</text>
    <text x="24" y="222" fill="#768390">sortyard: merge passes:    1</text>

    <text x="24" y="274"><tspan fill="#6cb6ff">$</tspan> head -3 sorted.csv</text>
    <text x="24" y="302" fill="#909dab">id,item,price,ordered_at</text>
    <text x="24" y="328"><tspan fill="#57ab5a">ord-0084397,"part, size 0",99990.97,2026-02-06T13:37:00Z</tspan></text>
    <text x="24" y="354"><tspan fill="#57ab5a">ord-0184388,"part, size 17",99990.88,2026-03-09T20:08:00Z</tspan></text>

    <text x="24" y="406"><tspan fill="#6cb6ff">$</tspan> sortyard --check -k price:num:desc -k ordered_at:date sorted.csv &amp;&amp; echo sorted</text>
    <text x="24" y="434" fill="#57ab5a">sorted</text>

    <text x="24" y="486"><tspan fill="#6cb6ff">$</tspan> sort -t, -k3,3nr export.csv | head -2   <tspan fill="#768390"># GNU sort, same file, same intent</tspan></text>
    <text x="24" y="514" fill="#909dab">id,item,price,ordered_at</text>
    <text x="24" y="540"><tspan fill="#f47067">ord-0000000,"part, size 0",0.00,2026-01-01T00:00:00Z</tspan></text>
    <text x="24" y="568" fill="#e0b543">↑ the quoted comma shifted every column: a "descending price" sort</text>
    <text x="24" y="594" fill="#e0b543">  that starts with the 0.00 row — and the header was never special</text>

    <text x="24" y="646" fill="#768390"># 1,000,000 rows, 57 MB, 16 MB buffer → 9 runs, 1 merge pass, 3.5 s</text>
  </g>
</svg>
